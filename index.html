<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>היומן שלי</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDsCb5PySFnEH-6aEg4vpkAJvuXOueRQ6A",
            authDomain: "foodlog-34143.firebaseapp.com",
            projectId: "foodlog-34143",
            storageBucket: "foodlog-34143.firebasestorage.app",
            messagingSenderId: "340021087859",
            appId: "1:340021087859:web:8f401ae72a35c13c77e406"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.saveToCloud = async function() {
            const food = document.getElementById('foodInput').value;
            if (!food) return;
            await addDoc(collection(db, "meals"), { name: food, date: new Date().toLocaleDateString('he-IL') });
            alert("נשמר!");
            document.getElementById('foodInput').value = '';
        };
    </script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fce4ec; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        h1 { color: #c2185b; }
        input { width: 80%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; margin-bottom: 10px; }
        button { background-color: #d81b60; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>המסע שלי 🌸</h1>
    <div class="card">
        <input type="text" id="foodInput" placeholder="מה אכלתי היום?">
        <br>
        <button onclick="saveToCloud()">שמרי לענן</button>
    </div>
</body>
</html>
