<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יומן אוכל אישי</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fff0f5; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 10px auto; }
        select, input, button { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { background-color: #d81b60; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button.success { background-color: #4caf50; }
        .log-item { background: #fff; border-right: 5px solid #d81b60; padding: 10px; margin: 5px 0; text-align: right; border-radius: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <button class="nav-btn" onclick="show('input')">הזנת ארוחה</button>
    <button class="nav-btn" onclick="show('history')">יומן אכילה</button>

    <div id="inputScreen" class="card">
        <h2>מה אכלתי?</h2>
        <select id="foodSelect">
            <option value="אורז (2 כפות)">אורז (2 כפות)</option>
            <option value="קוסקוס (2 כפות)">קוסקוס (2 כפות)</option>
            <option value="פתיתים (2 כפות)">פתיתים (2 כפות)</option>
            <option value="3 קציצות בשר ברוטב">3 קציצות בשר ברוטב</option>
            <option value="פילה סלמון">פילה סלמון</option>
        </select>
        <input type="text" id="customFood" placeholder="או כתבי מאכל אחר...">
        <button id="saveBtn" onclick="saveMeal()">שמרי ביומן</button>
    </div>

    <div id="historyScreen" class="card hidden">
        <h2>היסטוריה</h2>
        <div id="historyList"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDsCb5PySFnEH-6aEg4vpkAJvuXOueRQ6A",
            authDomain: "foodlog-34143.firebaseapp.com",
            projectId: "foodlog-34143",
            storageBucket: "foodlog-34143.firebasestorage.app",
            messagingSenderId: "340021087859",
            appId: "1:340021087859:web:8f401ae72a35c13c77e406"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function show(s) {
            document.getElementById('inputScreen').classList.toggle('hidden', s !== 'input');
            document.getElementById('historyScreen').classList.toggle('hidden', s !== 'history');
            if (s === 'history') loadHistory();
        }

        async function saveMeal() {
            const btn = document.getElementById('saveBtn');
            const food = document.getElementById('customFood').value || document.getElementById('foodSelect').value;
            
            await db.collection("meals").add({ food, date: new Date().toLocaleDateString('he-IL'), ts: new Date() });
            
            btn.textContent = "נשמר בהצלחה! ✅";
            btn.classList.add('success');
            setTimeout(() => { btn.textContent = "שמרי ביומן"; btn.classList.remove('success'); }, 2000);
        }

        async function loadHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            const snap = await db.collection("meals").orderBy("ts", "desc").get();
            snap.forEach(d => list.innerHTML += `<div class="log-item">${d.data().date} - ${d.data().food}</div>`);
        }
    </script>
</body>
</html>
