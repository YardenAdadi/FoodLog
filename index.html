<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>היומן שלי</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fff0f5; padding: 20px; text-align: center; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: 50px auto; }
        h1 { color: #d81b60; font-size: 24px; }
        input { width: 100%; padding: 15px; border: 2px solid #fce4ec; border-radius: 15px; margin: 20px 0; box-sizing: border-box; font-size: 16px; }
        button { background-color: #d81b60; color: white; border: none; padding: 15px 30px; border-radius: 15px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1>היומן שלי 🌸</h1>
        <input type="text" id="foodInput" placeholder="מה אכלתי היום?">
        <button id="saveBtn">שמרי לענן</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDsCb5PySFnEH-6aEg4vpkAJvuXOueRQ6A",
            authDomain: "foodlog-34143.firebaseapp.com",
            projectId: "foodlog-34143",
            storageBucket: "foodlog-34143.firebasestorage.app",
            messagingSenderId: "340021087859",
            appId: "1:340021087859:web:8f401ae72a35c13c77e406"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const food = document.getElementById('foodInput').value;
            if (!food) return;
            try {
                await addDoc(collection(db, "meals"), { 
                    name: food, 
                    date: new Date().toLocaleDateString('he-IL') 
                });
                alert("נשמר ביומן!");
                document.getElementById('foodInput').value = '';
            } catch (e) {
                alert("שגיאה בשמירה: " + e.message);
            }
        });
    </script>
</body>
</html>
