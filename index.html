<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>היומן שלי</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <h1>המסע שלי 🌸</h1>
    <input type="text" id="foodInput" placeholder="מה אכלתי?">
    <button onclick="saveToCloud()">שמרי לענן</button>

    <script>
        // המפתחות שלך
        const firebaseConfig = {
            apiKey: "AIzaSyDsCb5PySFnEH-6aEg4vpkAJvuXOueRQ6A",
            authDomain: "foodlog-34143.firebaseapp.com",
            projectId: "foodlog-34143",
            storageBucket: "foodlog-34143.firebasestorage.app",
            messagingSenderId: "340021087859",
            appId: "1:340021087859:web:8f401ae72a35c13c77e406"
        };

        // אתחול בשיטה הישנה שתואמת לקישורים שלך
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        window.saveToCloud = function() {
            const food = document.getElementById('foodInput').value;
            db.collection("meals").add({
                name: food,
                date: new Date().toLocaleDateString('he-IL')
            })
            .then(() => {
                alert("נשמר בענן!");
                document.getElementById('foodInput').value = '';
            })
            .catch((error) => {
                alert("שגיאה: " + error.message);
            });
        };
    </script>
</body>
</html>
