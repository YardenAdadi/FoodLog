<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יומן האוכל שלי</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fff0f5; padding: 20px; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; }
        h1 { color: #d81b60; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { background-color: #d81b60; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px; }
        .nav-btn { background-color: #fce4ec; color: #d81b60; margin: 5px; }
        .hidden { display: none; }
        .log-item { border-bottom: 1px solid #eee; padding: 10px; text-align: right; }
    </style>
</head>
<body>

    <div style="margin-bottom: 20px;">
        <button class="nav-btn" onclick="showScreen('input')">הזנת נתונים</button>
        <button class="nav-btn" onclick="showScreen('history')">יומן לפי ימים</button>
    </div>

    <div id="inputScreen" class="card">
        <h1>הזנת נתונים 🌸</h1>
        <input type="number" id="hunger" placeholder="רמת רעב (1-5)">
        <select id="flavor">
            <option value="מתוק">מתוק</option>
            <option value="מלוח">מלוח</option>
        </select>
        <input type="number" id="satisfaction" placeholder="אחוז סיפוק (0-100)">
        <input type="text" id="food" placeholder="מה אכלתי?">
        <button onclick="saveMeal()">שמרי ביומן</button>
    </div>

    <div id="historyScreen" class="card hidden">
        <h1>היומן שלי 📖</h1>
        <div id="historyList"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDsCb5PySFnEH-6aEg4vpkAJvuXOueRQ6A",
            authDomain: "foodlog-34143.firebaseapp.com",
            projectId: "foodlog-34143",
            storageBucket: "foodlog-34143.firebasestorage.app",
            messagingSenderId: "340021087859",
            appId: "1:340021087859:web:8f401ae72a35c13c77e406"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function showScreen(screen) {
            document.getElementById('inputScreen').classList.toggle('hidden', screen !== 'input');
            document.getElementById('historyScreen').classList.toggle('hidden', screen !== 'history');
            if (screen === 'history') loadHistory();
        }

        async function saveMeal() {
            const data = {
                hunger: document.getElementById('hunger').value,
                flavor: document.getElementById('flavor').value,
                satisfaction: document.getElementById('satisfaction').value,
                food: document.getElementById('food').value,
                date: new Date().toLocaleDateString('he-IL'),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };
            await db.collection("meals").add(data);
            alert("נשמר!");
            document.getElementById('food').value = '';
        }

        async function loadHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            const snapshot = await db.collection("meals").orderBy("timestamp", "desc").get();
            snapshot.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `<div class="log-item"><b>${d.date}</b>: ${d.food} (סיפוק: ${d.satisfaction}%)</div>`;
            });
        }
    </script>
</body>
</html>
