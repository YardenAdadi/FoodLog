<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יומן תזונה אישי</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fff0f5; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        select, input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd; }
        button { background-color: #d81b60; color: white; border: none; font-weight: bold; cursor: pointer; }
        .meal-chip { background: #f8bbd0; padding: 5px 10px; border-radius: 15px; display: inline-block; margin: 3px; }
        .day-group { background: #fff; padding: 10px; border-radius: 10px; margin-bottom: 10px; border-right: 5px solid #d81b60; }
    </style>
</head>
<body>

    <div class="card">
        <h2>הוספת מאכל לסל</h2>
        <select id="foodSelect">
            <option value="אורז (2 כפות)">אורז (2 כפות)</option>
            <option value="קוסקוס (2 כפות)">קוסקוס (2 כפות)</option>
            <option value="3 קציצות בשר">3 קציצות בשר</option>
            <option value="פילה סלמון">פילה סלמון</option>
        </select>
        <button onclick="addToCart()">הוסיפי לסל ➕</button>
        <div id="cart" style="margin: 10px 0;"></div>
        
        <select id="mealType">
            <option value="בוקר">בוקר</option>
            <option value="עשר">עשר</option>
            <option value="צהריים">צהריים</option>
            <option value="ביניים">ביניים</option>
            <option value="ערב">ערב</option>
        </select>
        <button onclick="saveMeal()" style="background-color: #4caf50;">שמרי ארוחה מלאה ✅</button>
    </div>

    <div class="card">
        <h2>יומן אכילה</h2>
        <div id="historyList"></div>
    </div>

    <script>
        const firebaseConfig = { /* המפתחות שלך נשארים אותו דבר */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let cart = [];

        function addToCart() {
            const food = document.getElementById('foodSelect').value;
            cart.push(food);
            document.getElementById('cart').innerHTML = cart.map(f => `<span class="meal-chip">${f}</span>`).join('');
        }

        async function saveMeal() {
            if (cart.length === 0) return alert("הסל ריק!");
            await db.collection("meals").add({
                items: cart,
                type: document.getElementById('mealType').value,
                date: new Date().toLocaleDateString('he-IL'),
                ts: new Date()
            });
            cart = [];
            document.getElementById('cart').innerHTML = '';
            alert("הארוחה נשמרה!");
            loadHistory();
        }

        async function loadHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            const snap = await db.collection("meals").orderBy("ts", "desc").get();
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `<div class="day-group"><b>${data.date} - ${data.type}</b><br>${data.items.join(', ')}</div>`;
            });
        }
        loadHistory();
    </script>
</body>
</html>
